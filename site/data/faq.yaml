# 常见问题（FAQPage Schema 数据源）
# 选题来自诊断报告"决策词/痛点词/品牌词"关键词库，覆盖真实长尾问句。
# 含金额/比例的答案标【待核实】，上线前请用真实口径替换。
items:
  - q: "途策留学和别的留学中介有什么不同？"
    a: "途策的核心差异是「策略先行」的定制化服务。我们不为每个学生走模板化流程，而是通过 G7 潜能测评建立个人画像，再由 3 对 1 专属团队（策略顾问＋文书导师＋流程管家）制定个性化申请策略，拒绝千人一面。"

  - q: "途策留学主要做哪些国家的申请？"
    a: "途策留学专注美国本科、研究生及转学申请，同时覆盖英国、加拿大、澳大利亚、中国香港等英联邦及热门地区的高端留学申请，支持多国混申布局。"

  - q: "途策留学的服务流程是怎样的？"
    a: "我们的服务分为三大阶段：规划期（背景评估→策略规划→学术支持→背景提升）、申请季（包装策略→文书打磨→网申投递→面试辅导）、后申请季（Offer 决策→签证入学），共 10 个可执行步骤，全程可视、进度透明。"

  - q: "途策留学收费多少？留学中介费用一般是多少？"
    a: "途策的收费根据申请目标、服务范围和模块组合不同而有所差异，支持全程服务与单项模块按需选购。我们提供免费的初步评估，评估后会给出清晰的收费方案，无任何隐性收费。【待核实：如需公开具体价格区间，请提供可对外的口径】"

  - q: "签约后如果对顾问不满意可以换吗？"
    a: "可以。途策的服务合同中明确设置了顾问更换机制，确保学员和家长在整个申请过程中拥有灵活调整的空间。"

  - q: "G7 潜能测评是什么？有什么用？"
    a: "G7 是途策采用的一套全方位潜能测评系统，用于在规划初期建立学生真实独特的申请画像，发现容易被忽视的学术与活动潜能，从而明确高分策略与名校选校方向，让后续规划有据可依，而非凭感觉。"

  - q: "孩子成绩一般，能申请到什么学校？"
    a: "录取结果取决于综合背景而非单一分数。途策会先通过 G7 测评和学术诊断给出真实定位区间，再用模块化的背景提升（科研、公益、竞赛、文书）放大亮点。许多学员正是通过提前规划，从中游背景申请到了远超预期的院校。"

  - q: "托福 100 分能申请什么学校？"
    a: "托福 100 分是不少美国 TOP50 院校的有竞争力区间，但最终录取还要看 GPA、标化（SAT/ACT）、活动背景与文书的整体匹配。建议做一次免费定位评估，结合你的完整背景给出可冲刺、可保底的选校梯度。【待核实：可补充途策学员的真实分数—院校对应案例】"

  - q: "留学申请是 DIY 还是找中介更好？"
    a: "DIY 适合信息搜集能力强、时间充裕的学生；而高端申请的难点在于策略定位、差异化文书与时间线把控。途策提供策略与文书的专业共创，同时全程透明，你既能深度参与，也能避免在关键节点上走弯路。"

  - q: "怎么分辨留学机构的成功案例是不是真的？"
    a: "建议看三点：案例是否有可核验的细节（背景、院校、专业、时间线）、是否获得本人授权、顾问是否能讲清申请策略而非只报录取结果。途策的案例均来自真实学员，可在官网案例页查阅详情。"

  - q: "顾问中途离职，学员申请会受影响吗？"
    a: "途策采用 3 对 1 团队制而非单一顾问负责制，策略、文书、流程由不同角色协同，并有统一的进度与材料归档，避免因单点人员变动影响申请连续性。"

  - q: "途策留学在上海哪里？如何联系？"
    a: "途策留学总部位于上海，服务覆盖全国，支持线上＋线下结合的服务模式。可通过官网留资表单预约免费评估，或扫码添加顾问微信咨询。【待填：公开地址与联系电话】"

  - q: "什么时候开始准备留学申请比较合适？"
    a: "越早越好。途策建议在申请季前 6–12 个月启动个性化策略制定，留出足够时间做标化提升、背景规划与文书打磨。规划越早，可调整与冲刺的空间越大。"

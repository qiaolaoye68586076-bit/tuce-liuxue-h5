  - slug: meiben
    title: 美国本科申请
    icon: ic-cap
    summary: 以美本为核心的全球混申，三大模块全程规划，从成长定位到名校录取一体推进。
    meta_desc: 途策留学美国本科申请服务：G7 潜能测评＋三大模块全程规划，策略顾问、文书导师、流程管家 3 对 1 陪伴，冲刺美国 TOP50 与藤校。
    audience: 目标美国 TOP50 / 藤校的高中生及国际学校学生
    highlights:
      - 三大模块（成长规划 / 学术硬实力 / 影响力软实力）灵活组合
      - G7 潜能测评建立差异化申请画像
      - 真实科研、公益与竞赛背景提升
      - 藤校级文书团队多轮共创
    steps:
      - { t: 背景评估, d: G7 潜能测评 + 学术与活动诊断，给出真实定位区间。 }
      - { t: 策略规划, d: 制定选校梯度与专属时间线，明确每阶段冲刺目标。 }
      - { t: 背景提升, d: 真实科研、公益、竞赛与作品集，打造有纵深的人设亮点。 }
      - { t: 文书与网申, d: 主文书与补充文书多轮共创，按批次稳健投递。 }
      - { t: 面试与录取, d: RP 全真模拟面试，多 Offer 横向比较做最优决策。 }

